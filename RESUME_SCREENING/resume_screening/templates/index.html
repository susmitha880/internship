<!DOCTYPE html>
<html>
<head>
    <title>Resume Screening</title>
</head>
<body>
    <h2>AI Resume Screening System</h2>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <label>Enter Job Description:</label><br>
        <textarea name="job_description" rows="6" cols="60"></textarea><br><br>

        <label>Upload Resumes:</label><br>
        <input type="file" name="resumes" multiple accept=".pdf" required>

        <input type="submit" value="Screen Resumes">
    </form>
</body>
</html>
